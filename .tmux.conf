# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

set -g @resurrect-post-restore-hook 'source-file ~/.tmux.conf'

set -g default-terminal "xterm-256color"

set -g focus-events on
set -sg escape-time 10

set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix

unbind '%' 
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind _ split-window -v -c "#{pane_current_path}"

unbind r
set -g @config-path "$HOME/.tmux.conf"
bind r source-file "$HOME/.tmux.conf" \; display-message "Reloaded #{@config-path}"

bind -r j resize-pane -D 30
bind -r k resize-pane -U 30
bind -r l resize-pane -R 30
bind -r h resize-pane -L 30

# Smart pane switching with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator

# is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
#     | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -r m resize-pane -Z

set-window-option -g mode-keys vi

# Mouse off - click focuses window (from other apps) but no mouse nav/scroll
# Toggle: Ctrl-Space m
set -g mouse off
bind m if -F "#{mouse}" "set -g mouse off; display-message 'Mouse OFF'" "set -g mouse on; display-message 'Mouse ON'"

# Show message on mouse scroll attempt
bind -n WheelUpPane display-message "Scroll: Ctrl-Space [ then j/k or arrows, q to exit"
bind -n WheelDownPane display-message "Scroll: Ctrl-Space [ then j/k or arrows, q to exit"

# Enter copy mode (scroll history)
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'jimeh/tmux-themepack' # to configure tmux theme
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @themepack 'powerline/default/cyan' # use this theme for tmux

set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# Initialize TMUX plugin manager (Needs to be last plugin)
run '~/.tmux/plugins/tpm/tpm'

# Smart pane switching - h/j/k/l/\
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R
bind-key -n C-\\ select-pane -l

# Dim inactive panes (after tpm so themepack doesn't override)
set -g window-style 'fg=colour246'
set -g window-active-style 'fg=terminal'

#Sort alphabetically
bind s choose-session -Z -O name